name: Bing IndexNow URL Submission

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs to submit (one per line)'
        required: false
        default: ''
  # 自动触发：每次推送到 master 分支时
  push:
    branches: [ master ]
  # 定时触发：每天 UTC 时间 8:00
  schedule:
    - cron: '0 8 * * *'

jobs:
  submit-indexnow:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Create IndexNow submission script
      run: |
        cat > indexnow_submitter.py << 'SCRIPT_EOF'
        #!/usr/bin/env python3
        """
        GitHub Actions IndexNow 提交脚本 - 修复版本
        自动从_posts目录提取文章URL并提交到IndexNow/Bing
        """
        import os
        import requests
        import json
        import sys
        from datetime import datetime
        from pathlib import Path
        
        # 配置 - 修复为正确的网站
        KEY = "8575fe8139f14b2da85e40bbc8b86ce2"
        HOST = "jichantuijian.github.io"  # 修复：改为正确的网站
        BASE_URL = "https://jichantuijian.github.io"  # 修复：添加基础URL
        API_URL = "https://api.indexnow.org/indexnow"
        POSTS_DIR = "_posts"
        
        def extract_urls_from_posts(limit=1000):
            """从_posts目录提取文章URL"""
            urls = []
            
            if not os.path.exists(POSTS_DIR):
                print(f"⚠️  _posts 目录不存在: {POSTS_DIR}")
                return urls
            
            # 获取所有.md文件
            md_files = sorted(Path(POSTS_DIR).glob("*.md"))
            
            for i, md_file in enumerate(md_files):
                if i >= limit:
                    break
                
                filename = md_file.name
                # 移除.md扩展名
                slug_part = filename[:-3]
                
                # 提取日期和slug: YYYY-MM-DD-slug
                parts = slug_part.split("-", 3)
                if len(parts) >= 4:
                    year, month, day = parts[0], parts[1], parts[2]
                    slug = parts[3]
                    
                    # 构建URL
                    url = f"{BASE_URL}/{year}-{month}-{day}-{slug}/"
                    urls.append(url)
            
            return urls
        
        def submit_urls(urls):
            """提交 URL 列表到 IndexNow"""
            results = []
            
            # 分批提交（每批10个URL）
            batch_size = 10
            total_batches = (len(urls) + batch_size - 1) // batch_size
            
            for batch_num in range(0, len(urls), batch_size):
                batch_urls = urls[batch_num:batch_num + batch_size]
                batch_index = batch_num // batch_size + 1
                
                data = {
                    "host": HOST,
                    "key": KEY,
                    "keyLocation": f"https://{HOST}/{KEY}.txt",
                    "urlList": batch_urls
                }
                
                try:
                    response = requests.post(API_URL, json=data, timeout=30)
                    
                    success = response.status_code in [200, 202]
                    
                    # 输出日志
                    status = "✅" if success else "❌"
                    print(f"{status} [批次 {batch_index}/{total_batches}] 提交 {len(batch_urls)} 个URL - Status: {response.status_code}")
                    
                    if not success:
                        print(f"   响应: {response.text[:200]}")
                    
                    for url in batch_urls:
                        result = {
                            "url": url,
                            "status_code": response.status_code,
                            "success": success,
                            "response": response.text if response.status_code != 200 else "Success"
                        }
                        results.append(result)
                    
                except Exception as e:
                    print(f"❌ [批次 {batch_index}/{total_batches}] 错误: {e}")
                    for url in batch_urls:
                        result = {
                            "url": url,
                            "status_code": None,
                            "success": False,
                            "response": str(e)
                        }
                        results.append(result)
            
            return results
        
        def main():
            # 获取要提交的 URL
            urls_input = os.getenv('INPUT_URLS', '').strip()
            
            if urls_input:
                # 从手动输入获取 URL
                urls = [url.strip() for url in urls_input.split('\n') if url.strip()]
                print(f"📝 使用手动输入的 URL")
            else:
                # 从_posts目录自动提取 URL
                urls = extract_urls_from_posts(limit=1000)
                print(f"📂 从 _posts 目录自动提取 URL")
            
            if not urls:
                print("⚠️  没有找到要提交的 URL")
                return
            
            print(f"🚀 开始提交 {len(urls)} 个 URL 到 IndexNow")
            print(f"📅 提交时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
            print(f"🔑 使用密钥: {KEY}")
            print(f"🌐 网站: {HOST}")
            print("-" * 60)
            
            # 提交 URL
            results = submit_urls(urls)
            
            # 统计结果
            successful = sum(1 for r in results if r["success"])
            failed = len(results) - successful
            
            print("-" * 60)
            print("📊 提交统计:")
            print(f"✅ 成功: {successful}")
            print(f"❌ 失败: {failed}")
            print(f"📋 总数: {len(results)}")
            
            # 如果有失败，输出详情
            if failed > 0:
                print("\n📝 失败详情:")
                for result in results:
                    if not result["success"]:
                        print(f"  ❌ {result['url']}: {result['response'][:100]}")
            
            # 设置输出变量
            print(f"::set-output name=success_count::{successful}")
            print(f"::set-output name=failed_count::{failed}")
            print(f"::set-output name=total_count::{len(results)}")
            
            # 成功则正常退出
            if successful > 0:
                sys.exit(0)
            else:
                sys.exit(1)
        
        if __name__ == "__main__":
            main()
        SCRIPT_EOF

    - name: Run IndexNow submission
      id: indexnow
      env:
        INPUT_URLS: ${{ github.event.inputs.urls }}
      run: |
        python indexnow_submitter.py

    - name: Create submission report
      if: always()
      run: |
        cat > submission_report.md << 'REPORT_EOF'
        # IndexNow 提交报告
        
        ## 提交详情
        - **工作流:** ${{ github.workflow }}
        - **运行 ID:** ${{ github.run_id }}
        - **提交时间:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        - **触发方式:** ${{ github.event_name }}
        
        ## 提交统计
        - **成功:** ${{ steps.indexnow.outputs.success_count || 0 }}
        - **失败:** ${{ steps.indexnow.outputs.failed_count || 0 }}
        - **总数:** ${{ steps.indexnow.outputs.total_count || 0 }}
        
        ## 配置信息
        - **密钥:** 8575fe8139f14b2da85e40bbc8b86ce2
        - **网站:** jichantuijian.github.io
        - **API:** https://api.indexnow.org/indexnow
        
        此报告由 GitHub Actions 自动生成。
        REPORT_EOF
        
        echo "📄 提交报告已生成"

    - name: Upload submission report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: indexnow-submission-report
        path: submission_report.md
        retention-days: 30

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'IndexNow 提交失败',
            body: 'IndexNow URL 提交工作流运行失败。请检查日志了解详情。\n\n工作流运行: ' + context.runId
          })
