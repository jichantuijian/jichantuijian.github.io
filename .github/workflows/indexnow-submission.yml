name: Bing IndexNow URL Submission

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs to submit (one per line)'
        required: true
        default: |
          https://clash-for-android.github.io/
          https://clash-for-android.github.io/download
          https://clash-for-android.github.io/tutorial
          https://clash-for-android.github.io/faq
          https://clash-for-android.github.io/about
          https://clash-for-android.github.io/contact
  # 自动触发：每次推送到 master 分支时
  push:
    branches: [ master ]
  # 定时触发：每天 UTC 时间 8:00
  schedule:
    - cron: '0 8 * * *'

jobs:
  submit-indexnow:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Create IndexNow submission script
      run: |
        cat > indexnow_submitter.py << 'SCRIPT_EOF'
        #!/usr/bin/env python3
        """
        GitHub Actions IndexNow 提交脚本
        """
        import os
        import requests
        import json
        import sys
        from datetime import datetime
        
        # 配置
        KEY = "8575fe8139f14b2da85e40bbc8b86ce2"
        HOST = "clash-for-android.github.io"
        API_URL = "https://api.indexnow.org/indexnow"
        
        def submit_urls(urls):
            """提交 URL 列表到 IndexNow"""
            results = []
            
            for url in urls:
                url = url.strip()
                if not url or not url.startswith('http'):
                    continue
                    
                data = {
                    "host": HOST,
                    "key": KEY,
                    "keyLocation": f"https://{HOST}/{KEY}.txt",
                    "urlList": [url]
                }
                
                try:
                    response = requests.post(API_URL, json=data, timeout=30)
                    
                    result = {
                        "url": url,
                        "status_code": response.status_code,
                        "success": response.status_code in [200, 202],
                        "response": response.text if response.status_code != 200 else "Success"
                    }
                    
                    results.append(result)
                    
                    # 输出日志
                    status = "✅" if result["success"] else "❌"
                    print(f"{status} {url} - Status: {response.status_code}")
                    
                except Exception as e:
                    result = {
                        "url": url,
                        "status_code": None,
                        "success": False,
                        "response": str(e)
                    }
                    results.append(result)
                    print(f"❌ {url} - Error: {e}")
            
            return results
        
        def main():
            # 获取要提交的 URL
            urls_input = os.getenv('INPUT_URLS', '')
            
            if urls_input:
                # 从手动输入获取 URL
                urls = [url.strip() for url in urls_input.split('\n') if url.strip()]
            else:
                # 默认 URL 列表
                urls = [
                    "https://clash-for-android.github.io/",
                    "https://clash-for-android.github.io/download",
                    "https://clash-for-android.github.io/tutorial", 
                    "https://clash-for-android.github.io/faq",
                    "https://clash-for-android.github.io/about",
                    "https://clash-for-android.github.io/contact"
                ]
            
            print(f"🚀 开始提交 {len(urls)} 个 URL 到 IndexNow")
            print(f"📅 提交时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
            print(f"🔑 使用密钥: {KEY}")
            print("-" * 50)
            
            # 提交 URL
            results = submit_urls(urls)
            
            # 统计结果
            successful = sum(1 for r in results if r["success"])
            failed = len(results) - successful
            
            print("-" * 50)
            print("📊 提交统计:")
            print(f"✅ 成功: {successful}")
            print(f"❌ 失败: {failed}")
            print(f"📋 总数: {len(results)}")
            
            # 如果有失败，输出详情
            if failed > 0:
                print("\n📝 失败详情:")
                for result in results:
                    if not result["success"]:
                        print(f"  ❌ {result['url']}: {result['response']}")
            
            # 设置输出变量
            print(f"::set-output name=success_count::{successful}")
            print(f"::set-output name=failed_count::{failed}")
            print(f"::set-output name=total_count::{len(results)}")
            
            # 如果有失败，工作流失败
            if failed > 0:
                sys.exit(1)
        
        if __name__ == "__main__":
            main()
        SCRIPT_EOF

    - name: Run IndexNow submission
      id: indexnow
      env:
        INPUT_URLS: ${{ github.event.inputs.urls }}
      run: |
        python indexnow_submitter.py

    - name: Create submission report
      if: always()
      run: |
        cat > submission_report.md << 'REPORT_EOF'
        # IndexNow 提交报告
        
        ## 提交详情
        - **工作流:** ${{ github.workflow }}
        - **运行 ID:** ${{ github.run_id }}
        - **提交时间:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        - **触发方式:** ${{ github.event_name }}
        
        ## 提交统计
        - **成功:** ${{ steps.indexnow.outputs.success_count || 0 }}
        - **失败:** ${{ steps.indexnow.outputs.failed_count || 0 }}
        - **总数:** ${{ steps.indexnow.outputs.total_count || 0 }}
        
        ## 配置信息
        - **密钥:** 8575fe8139f14b2da85e40bbc8b86ce2
        - **网站:** clash-for-android.github.io
        - **API:** https://api.indexnow.org/indexnow
        
        此报告由 GitHub Actions 自动生成。
        REPORT_EOF
        
        echo "📄 提交报告已生成"

    - name: Upload submission report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: indexnow-submission-report
        path: submission_report.md
        retention-days: 30

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'IndexNow 提交失败',
            body: 'IndexNow URL 提交工作流运行失败。请检查日志了解详情。\n\n工作流运行: ' + context.runId
          })